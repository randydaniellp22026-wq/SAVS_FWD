# ============================================================
# Configuración de Nginx — SPA React + Proxy reverso API
# Proyecto: The Destiny Vault / Importadora SAVS
#
# Funcionalidades:
#   - Sirve archivos estáticos del build de Vite
#   - try_files para soporte de SPA (React Router)
#   - Proxy reverso de /api/ al servicio backend
#   - Caché de assets estáticos optimizado
#   - Compresión gzip habilitada
# ============================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Proxy reverso hacia el backend API ──
    # Todas las peticiones /api/ se redirigen al contenedor backend
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout generoso para operaciones del backend
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Proxy para archivos subidos (Multer) ──
    location /uploads/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Caché de assets estáticos (JS, CSS, imágenes) ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback — React Router ──
    # Todas las rutas que no sean archivos estáticos ni API
    # se redirigen a index.html para que React Router las maneje
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Páginas de error personalizadas ──
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
