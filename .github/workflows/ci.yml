# ============================================================
# CI Pipeline — Integración Continua
# Proyecto: The Destiny Vault / Importadora SAVS
#
# Se ejecuta en cada push o pull_request a main/develop.
# Pasos: Checkout → Setup Node → Instalar deps → Lint → Test → Build
# ============================================================

name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──── Job: Lint y Test del Backend ────
  backend-checks:
    name: 🔧 Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    # Servicio MySQL para los tests de integración
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: SAVS_DB_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: test_password
      DB_NAME: SAVS_DB_test
      JWT_SECRET: ci_test_secret_key_not_for_production

    steps:
      # 1. Clonar el repositorio completo
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20 con caché de npm
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # 3. Instalar dependencias del backend
      - name: 📦 Instalar dependencias
        run: npm ci

      # 4. Ejecutar migraciones de la base de datos de prueba
      - name: 🗄️ Migrar base de datos de test
        run: npx sequelize-cli db:migrate

      # 5. Ejecutar los tests con Jest
      - name: 🧪 Ejecutar tests
        run: npx jest --forceExit --detectOpenHandles

  # ──── Job: Lint, Build del Frontend ────
  frontend-checks:
    name: 🎨 Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      # 1. Clonar el repositorio
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20 con caché de npm
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 3. Instalar dependencias del frontend
      - name: 📦 Instalar dependencias
        run: npm ci

      # 4. Ejecutar el linter de ESLint
      - name: 🔍 Ejecutar ESLint
        run: npm run lint

      # 5. Build de producción con Vite (verificar que compile)
      - name: 🏗️ Build de producción
        run: npm run build
