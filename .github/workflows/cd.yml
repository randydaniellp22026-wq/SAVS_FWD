# ============================================================
# CD Pipeline — Despliegue Continuo
# Proyecto: The Destiny Vault / Importadora SAVS
#
# Se ejecuta únicamente en push a main (después de merge).
# Pasos: Build Docker → Push a GitHub Container Registry → Deploy
#
# SECRETOS NECESARIOS (configurar en Settings > Secrets):
#   - DOCKER_USERNAME:  Usuario de Docker Hub o GHCR
#   - DOCKER_PASSWORD:  Token de acceso de Docker Hub o GHCR
#   - DEPLOY_SSH_KEY:   Clave privada SSH para el servidor de staging
#   - DEPLOY_HOST:      IP o dominio del servidor de despliegue
#   - DEPLOY_USER:      Usuario SSH del servidor
# ============================================================

name: CD — Build & Deploy

on:
  push:
    branches: [main]

# Permisos para escribir en GitHub Container Registry
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/savs

jobs:
  # ──── Job 1: Build y Push de imágenes Docker ────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # 2. Login en GitHub Container Registry
      - name: 🔐 Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Configurar Docker Buildx para builds multi-plataforma
      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build y push de la imagen del Frontend
      - name: 🎨 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Build y push de la imagen del Backend
      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──── Job 2: Deploy al entorno de staging ────
  deploy-staging:
    name: 🚀 Deploy a Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    # Solo se despliega si el build fue exitoso
    if: success()

    steps:
      # 1. Checkout (necesario para docker-compose.yml)
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # 2. Deploy vía SSH al servidor de staging
      #    NOTA: Adaptar según el proveedor (Railway, Render, VPS, etc.)
      #    Este ejemplo asume un VPS con Docker Compose instalado.
      - name: 🔑 Deploy vía SSH
        uses: appleboy/ssh-action@v1.0.3
        # Solo ejecuta si los secretos están configurados
        if: ${{ env.DEPLOY_HOST != '' }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/savs
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deploy completado: $(date)"

  # ──── Job 3: Notificación de estado ────
  notify:
    name: 📢 Notificación
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: always()

    steps:
      - name: 📋 Resumen del despliegue
        run: |
          echo "═══════════════════════════════════════"
          echo "  SAVS — Resultado del Deploy Pipeline"
          echo "═══════════════════════════════════════"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Actor:   ${{ github.actor }}"
          echo "  Build:   ${{ needs.build-and-push.result }}"
          echo "  Deploy:  ${{ needs.deploy-staging.result }}"
          echo "═══════════════════════════════════════"

      # Marcar el workflow como fallido si algún job falló
      - name: ❌ Verificar resultado
        if: ${{ needs.build-and-push.result == 'failure' || needs.deploy-staging.result == 'failure' }}
        run: exit 1
