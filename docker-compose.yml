# ============================================================
# Docker Compose — Producción
# Proyecto: The Destiny Vault / Importadora SAVS
#
# USO:
#   cp .env.example .env    # Rellenar variables
#   docker compose up -d    # Levantar todos los servicios
#   docker compose down     # Detener y eliminar contenedores
#   docker compose logs -f  # Ver logs en tiempo real
#
# SERVICIOS:
#   - frontend (Nginx:80)      — Aplicación React
#   - backend  (Node:5000)     — API Express
#   - db       (MySQL:3306)    — Base de datos relacional
# ============================================================

services:
  # ──── Frontend (React + Nginx) ────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: savs-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - savs-network
    restart: unless-stopped

  # ──── Backend (Node.js + Express) ────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savs-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-SAVS_DB}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - savs-network
    restart: unless-stopped

  # ──── Base de Datos (MySQL 8) ────
  db:
    image: mysql:8.0
    container_name: savs-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME:-SAVS_DB}
      - MYSQL_USER=${DB_USER:-savs_user}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - savs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ──── Volúmenes nombrados para persistencia ────
volumes:
  db-data:
    name: savs-db-data
  backend-uploads:
    name: savs-uploads

# ──── Red interna ────
networks:
  savs-network:
    name: savs-network
    driver: bridge
